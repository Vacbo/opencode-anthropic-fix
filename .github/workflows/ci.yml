name: CI

on:
    push:
        branches: [master]
    pull_request:
        branches: [master]

jobs:
    test:
        runs-on: ubuntu-latest
        env:
            HUSKY: 0
        steps:
            - uses: actions/checkout@v5

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - run: bun install --frozen-lockfile

            - name: Lint
              run: bun run lint

            - name: Format check
              run: bun run format:check

            - name: Typecheck
              run: bun run typecheck

            - name: Test
              run: bun run test

            - name: Build
              run: bun run build

    cli-binary-smoke:
        name: CLI binary smoke (${{ matrix.name }})
        runs-on: ${{ matrix.runsOn }}
        strategy:
            fail-fast: false
            matrix:
                # buildTargets: everything we want shipped on this runner (including musl/baseline
                #   cross-compile variants that cannot execute on the runner itself).
                # smokeTargets: subset of buildTargets whose libc/platform matches the runner, so
                #   the binary can actually run `--help`. See scripts/build-config.ts
                #   isTargetRunnableOnHost() for the rule.
                include:
                    - name: macos-x64
                      runsOn: macos-15-intel
                      buildTargets: darwin-x64
                      smokeTargets: darwin-x64
                    - name: macos-arm64
                      runsOn: macos-14
                      buildTargets: darwin-arm64
                      smokeTargets: darwin-arm64
                    - name: linux-x64
                      runsOn: ubuntu-24.04
                      buildTargets: linux-x64,linux-x64-baseline,linux-x64-modern
                      smokeTargets: linux-x64,linux-x64-baseline,linux-x64-modern
                    - name: linux-arm64
                      runsOn: ubuntu-24.04-arm
                      buildTargets: linux-arm64
                      smokeTargets: linux-arm64
                    - name: windows-x64
                      runsOn: windows-2022
                      buildTargets: windows-x64,windows-x64-modern
                      smokeTargets: windows-x64,windows-x64-modern
        env:
            HUSKY: 0
        steps:
            - uses: actions/checkout@v5

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - run: bun install --frozen-lockfile

            - name: Build CLI binaries
              run: bun run build:cli -- --targets=${{ matrix.buildTargets }}

            - name: Smoke test --help
              run: bun scripts/cli-binary-smoke.ts --targets=${{ matrix.smokeTargets }}
