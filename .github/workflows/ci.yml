name: CI

on:
    push:
        branches: [master]
    pull_request:
        branches: [master]

jobs:
    test:
        runs-on: ubuntu-latest
        env:
            HUSKY: 0
        steps:
            - uses: actions/checkout@v5

            - uses: actions/setup-node@v5
              with:
                  node-version: "24"

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - run: npm ci

            - name: Lint
              run: npm run lint

            - name: Format check
              run: npm run format:check

            - name: Test
              run: npm test

            - name: Build
              run: npm run build
