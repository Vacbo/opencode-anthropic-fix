name: Claude Code drift check

on:
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * *"

permissions:
  contents: read
  issues: write

concurrency:
  group: cch-drift
  cancel-in-progress: false

jobs:
  drift-check:
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install latest standalone Claude Code
        run: curl -fsSL https://claude.ai/install.sh | bash

      - name: Resolve latest installed standalone version
        id: standalone
        run: |
          latest=$(find "$HOME/.local/share/claude/versions" -maxdepth 1 -type f -regex '.*/[0-9]+\.[0-9]+\.[0-9]+' | sort -V | tail -1)
          if [ -z "$latest" ]; then
            echo "::error::No standalone Claude Code binary found after install"
            exit 1
          fi
          echo "path=$latest" >> "$GITHUB_OUTPUT"

      - name: Run standalone drift check
        id: standalone_check
        run: |
          set +e
          bun scripts/drift-checker/check-cch-constants.ts --path "${{ steps.standalone.outputs.path }}" --json > standalone-drift-report.json
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run npm bundle drift check
        id: npm_check
        run: |
          set +e
          bun scripts/drift-checker/check-cch-constants.ts --npm-version latest --json > npm-drift-report.json
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload drift reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cch-drift-reports
          path: |
            standalone-drift-report.json
            npm-drift-report.json

      - name: Create or update drift issue
        if: ${{ steps.standalone_check.outputs.exit_code != '0' || steps.npm_check.outputs.exit_code != '0' }}
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Claude Code cch drift detected';
            const body = [
              'A scheduled cch drift check detected upstream changes.',
              '',
              '- See the workflow artifacts `cch-drift-reports` for the standalone and npm reports.',
              `- Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              creator: 'github-actions[bot]',
            });

            const existing = issues.find((issue) => issue.title === title);
            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
              });
            }

      - name: Fail on drift
        if: ${{ steps.standalone_check.outputs.exit_code != '0' || steps.npm_check.outputs.exit_code != '0' }}
        run: |
          echo "Claude Code drift detected. See uploaded artifacts for details."
          exit 1
