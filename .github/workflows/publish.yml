name: Publish to npm

on:
    workflow_dispatch:
        inputs:
            bump:
                description: "Optional version bump type (patch, minor, major). Leave blank when the version was already bumped locally."
                required: false
                default: ""

# OIDC: id-token enables npm trusted publishing — no NPM_TOKEN secret needed.
# setup-node is kept only for the npm trusted-publishing/auth path.
permissions:
    id-token: write
    contents: write

concurrency:
    group: publish-npm
    cancel-in-progress: false

jobs:
    publish:
        runs-on: ubuntu-latest
        env:
            HUSKY: 0
        steps:
            - uses: actions/checkout@v5
              with:
                  fetch-depth: 0

            # OIDC: this step prepares npm trusted publishing via GitHub's OIDC endpoint.
            # The id-token: write permission above enables this automatically.
            # No NPM_TOKEN secret is needed — trusted publishing handles auth.
            - uses: actions/setup-node@v5
              with:
                  node-version: "24"
                  registry-url: "https://registry.npmjs.org/"

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - run: bun install --frozen-lockfile

            - name: Build
              run: bun run build

            - name: Test
              run: bun run test

            - name: Version bump
              if: ${{ github.event.inputs.bump != '' }}
              env:
                  BUMP_TYPE: ${{ github.event.inputs.bump }}
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  bun pm version "$BUMP_TYPE" -m "chore(release): v%s"
                  git push --follow-tags origin HEAD:master

            # OIDC: NODE_AUTH_TOKEN is not set. setup-node handles authentication via OIDC
            # and npm automatically uses the short-lived token for this authenticated session.
            - name: Publish
              run: npm publish --access public
